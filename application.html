<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Submitted</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e0f7fa;
            color: #00796b;
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #004d40;
        }

        p {
            font-size: 18px;
            margin: 20px 0;
        }

        .message {
            background-color: #ffffff;
            border: 2px solid #00796b;
            border-radius: 10px;
            padding: 30px;
            width: 60%;
            margin: 0 auto;
        }

        .button {
            padding: 10px 20px;
            background-color: #00796b;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
            display: inline-block;
        }

        .button:hover {
            background-color: #004d40;
        }
    </style>
</head>
<body>

    <div class="message">
        <h1>Application Submitted Successfully!</h1>
        <p>Thank you for applying to Green Haven Nursery. We appreciate your interest, and our team will review your application shortly.</p>
        <p>We will get back to you soon with an update!</p>
        <a href="/" class="button">Return to Home Page</a>
    </div>

</body>
</html>
