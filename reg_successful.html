<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful</title>
    <style>
        /* Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Success Container */
        .container {
            width: 100%;
            max-width: 500px;
            background-color: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        /* Success Header */
        h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #28a745;
            font-weight: 600;
        }

        /* Success Message */
        p {
            font-size: 16px;
            color: #555;
            margin-bottom: 20px;
        }

        /* Button Styling */
        .btn {
            padding: 12px 30px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        .btn:hover {
            background-color: #0056b3;
        }

    </style>
</head>
<body>

    <div class="container">
        <h2>Registration Successful!</h2>
        <p>Thank you for registering in GreenLeaf Nursury. hope it will be good experience for work with you</p>
        <a href="specialist.html" class="btn">Go to Login</a><br>
      
    </div>

</body>
</html>
